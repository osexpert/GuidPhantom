name: .NET 8 Tests (Linux + Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore GuidPhantom.Tests/GuidPhantom.Tests.csproj

    - name: Build (net8 only)
      run: dotnet build GuidPhantom.Tests/GuidPhantom.Tests.csproj --framework net8.0 --configuration Release --no-restore

    - name: Test (net8 only)
      run: dotnet test GuidPhantom.Tests/GuidPhantom.Tests.csproj --framework net8.0 --configuration Release --no-build